</head>
<body>
    <!-- NAV -->
        <div id="cursor"></div>
        <nav>
            <a class="nav-home" href="../../index.html">

                <path d="M1 7L7 1L13 7V13H9V9H5V13H1V7Z" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/>

                    <img src="./images/outside-biking.jpg" alt="biking"/>

                </div>

                <div class="stack-card" data-label="Hiking">

                </div>

                <div class="stack-card" data-label="Actor">

                    <div class="stack-card-label">Gym</div>
                </div>

        <div class="lightbox" id="lightbox">
            <button class="lightbox-close" id="lightboxClose">✕</button>
